<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}FIN.AI | Advanced Finance Tracker{% endblock %}</title>

    <meta name="description" content="AI-powered finance tracker for smarter budgeting, spending insights, and financial growth.">
    <meta name="theme-color" content="#4f46e5">

    <meta property="og:title" content="FIN.AI | Advanced Finance Tracker">
    <meta property="og:description" content="Smarter money decisions powered by AI.">
    <meta property="og:type" content="website">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            // Enable Dark Mode based on a class (for futureproofing)
            darkMode: 'class', 
            theme: {
                extend: {
                    // Custom colors for brand accents (Orange and Indigo)
                    colors: {
                        'brand-orange': '#f97316', // orange-500
                        'brand-indigo': '#4f46e5', // indigo-600
                    },
                    animation: {
                        fade: 'fadeIn 0.25s ease-in-out',
                        slide: 'slideUp 0.35s ease-out',
                        // Add subtle pulse for loader
                        'slow-pulse': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: 0 },
                            '100%': { opacity: 1 }
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(12px)', opacity: 0 },
                            '100%': { transform: 'translateY(0)', opacity: 1 }
                        }
                    }
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    {% block head %}{% endblock %}

    <style>
        /* Modernized Scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        /* Updated scrollbar thumb color to gray-400 for a muted, premium look */
        ::-webkit-scrollbar-thumb {
            background: #9ca3af; /* gray-400 */
            border-radius: 999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280; /* gray-500 */
        }
        /* Apply smooth transition to all color changes (essential for dark mode) */
        * {
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }
    </style>
</head>

<body class="bg-gray-100 dark:bg-gray-900 font-sans text-gray-900 dark:text-gray-100 antialiased animate-fade">

    <div id="global-loader"
         class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-orange-500 to-indigo-600 hidden z-50 animate-slow-pulse">
    </div>

    <div id="toast-container" class="fixed top-5 right-5 space-y-2 z-50"></div>

    <main class="min-h-screen animate-slide">
        {% block content %}{% endblock %}
    </main>

    <script>
        /* ===== TOAST SYSTEM ===== */
        function showToast(message, type = 'info') {
            // Updated colors to match the premium scheme
            const colors = {
                info: 'bg-indigo-600',
                success: 'bg-green-600',
                error: 'bg-red-600',
                warning: 'bg-orange-500' // Added warning for completeness
            };
            
            // Added icon based on type
            const icons = {
                info: '<i class="fas fa-info-circle mr-2"></i>',
                success: '<i class="fas fa-check-circle mr-2"></i>',
                error: '<i class="fas fa-exclamation-triangle mr-2"></i>',
                warning: '<i class="fas fa-exclamation-circle mr-2"></i>'
            };

            const toast = document.createElement('div');
            toast.className = `${colors[type]} text-white px-4 py-3 rounded-xl shadow-xl text-sm font-semibold flex items-center animate-fade`;
            toast.innerHTML = icons[type] + message;

            document.getElementById('toast-container').appendChild(toast);

            setTimeout(() => {
                // Add fade out animation before removing
                toast.classList.remove('animate-fade');
                toast.classList.add('opacity-0', 'transition-opacity', 'duration-300');
                setTimeout(() => toast.remove(), 300); // Wait for transition
            }, 3500);
        }

        // Example: Automatically display any Flask flash messages on page load
        document.addEventListener('DOMContentLoaded', () => {
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        showToast("{{ message|e }}", "{{ category }}");
                    {% endfor %}
                {% endif %}
            {% endwith %}
        });

        /* ===== DARK MODE (FUTURE READY) ===== */
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
        }

        /* ===== GLOBAL LOADER ===== */
        function showLoader() {
            document.getElementById('global-loader').classList.remove('hidden');
        }
        function hideLoader() {
            document.getElementById('global-loader').classList.add('hidden');
        }
    </script>

    {% block scripts %}{% endblock %}

</body>
</html>
